<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Pamela Fine Mishkin</title>
    <style>
      :root {
        color-scheme: light dark;
        --background: #f7f4ee;
        --foreground: #201f1d;
        --muted: #686058;
        --accent: #1f6f68;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #161616;
          --foreground: #f4f0e8;
          --muted: #b7aea3;
          --accent: #7bc9bd;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background: var(--background);
        color: var(--foreground);
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
        line-height: 1.5;
      }

      main {
        width: min(100%, 680px);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.25rem, 7vw, 5rem);
        font-weight: 500;
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        max-width: 34rem;
        margin: 0;
        color: var(--muted);
        font-size: clamp(1.1rem, 2vw, 1.3rem);
      }

      a {
        color: var(--accent);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.2em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Pamela Fine Mishkin</h1>
      <p>This site is offline for now. You can still find me on <a href="https://github.com/manlikemishap">GitHub</a>.</p>
    </main>
  </body>
</html>
